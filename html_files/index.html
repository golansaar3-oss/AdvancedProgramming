<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Computational Graph Server</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #222;
        }

        .page {
            padding: 20px;
        }

        .header {
            margin-bottom: 16px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            color: #1f4e79;
        }

        .header p {
            margin: 6px 0 0 0;
            color: #666;
            font-size: 14px;
        }

        .layout {
            display: flex;
            width: 100%;
            height: 82vh;
            gap: 14px;
        }

        iframe {
            height: 100%;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .forms-frame {
            width: 24%;
        }

        .graph-frame {
            width: 52%;
        }

        .table-frame {
            width: 24%;
        }
    </style>
</head>
<body>
    <div class="page">

        <div class="header">
            <h1>Computational Graph Server</h1>
            <p>Upload a configuration, publish messages, and view the computed graph.</p>
        </div>

        <div class="layout">

            <iframe
                src="/app/form.html"
                name="formsFrame"
                class="forms-frame">
            </iframe>

            <iframe
                src="/app/temp.html"
                name="graphFrame"
                class="graph-frame">
            </iframe>

            <iframe
                src="/app/temp.html"
                name="tableFrame"
                class="table-frame">
            </iframe>

        </div>

    </div>
</body>
</html>
