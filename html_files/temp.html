<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Waiting</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #222;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: white;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 30px;
            text-align: center;
        }

        .graph-icon {
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
        }

        h2 {
            margin: 0 0 10px 0;
            color: #1f4e79;
            font-size: 24px;
        }

        p {
            margin: 0;
            color: #666;
            font-size: 15px;
            line-height: 1.6;
        }

        .step {
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid #e5e5e5;
            font-size: 14px;
            color: #555;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="card">

            <div class="graph-icon">

                <svg width="130" height="70">

                    <defs>
                        <marker id="arrow"
                                markerWidth="8"
                                markerHeight="8"
                                refX="7"
                                refY="3"
                                orient="auto">
                            <path d="M0,0 L0,6 L7,3 z"
                                  fill="#555"/>
                        </marker>
                    </defs>

                    <!-- Topic -->
                    <rect x="10"
                          y="20"
                          width="40"
                          height="30"
                          rx="8"
                          ry="8"
                          fill="#d9ecff"
                          stroke="#2f6f9f"
                          stroke-width="2"/>

                    <!-- Arrow -->
                    <line x1="50"
                          y1="35"
                          x2="80"
                          y2="35"
                          stroke="#555"
                          stroke-width="2"
                          marker-end="url(#arrow)"/>

                    <!-- Agent -->
                    <circle cx="105"
                            cy="35"
                            r="16"
                            fill="#ddf8df"
                            stroke="#3b8b45"
                            stroke-width="2"/>

                </svg>

            </div>

            <h2>Waiting for Action</h2>

            <p>
                Upload a configuration file or publish a message
                using the control panel.
            </p>

            <div class="step">
                The graph or topic values will appear here automatically.
            </div>

        </div>

    </div>

</body>
</html>
