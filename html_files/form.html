<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Forms</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #222;
        }

        .forms-page {
            padding: 18px;
        }

        h2 {
            margin: 0 0 14px 0;
            color: #1f4e79;
            font-size: 22px;
        }

        .card {
            background: white;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h3 {
            margin: 0 0 6px 0;
            font-size: 17px;
            color: #333;
        }

        .card p {
            margin: 0 0 14px 0;
            color: #666;
            font-size: 13px;
            line-height: 1.4;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 12px;
            padding: 9px;
            border: 1px solid #c7d0d9;
            border-radius: 8px;
            background: #fff;
            font-size: 14px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #1f4e79;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background: #163a5a;
        }
    </style>
</head>
<body>

    <div class="forms-page">

        <h2>Control Panel</h2>

        <div class="card">
            <h3>Load Configuration</h3>
            <p>Upload a config file to create the agents, topics, and computational graph.</p>

            <!-- form for uploading a config file -->
            <form action="http://localhost:8080/upload"
                  method="post"
                  enctype="multipart/form-data"
                  target="graphFrame">

                <label>Configuration file</label>
                <input type="file" name="configFile">

                <input type="submit" value="Deploy">

            </form>
        </div>

        <div class="card">
            <h3>Publish Message</h3>
            <p>Send a message to a topic and update the current topic values table.</p>

            <!-- form for publishing a message to a topic -->
            <form action="http://localhost:8080/publish"
                  method="get"
                  target="tableFrame">

                <label>Topic name</label>
                <input type="text" name="topic" placeholder="Example: A">

                <label>Message</label>
                <input type="text" name="message" placeholder="Example: 5">

                <input type="submit" value="Send Message">

            </form>
        </div>

    </div>

</body>
</html>
